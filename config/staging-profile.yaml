version: 1
id: gia-su-ai
name: Gia Su AI staging
target:
  expectedHost: giasu-c2165.web.app
  loginPath: /login
  authenticatedPath: /app
privatePaths:
  browserProfileDirectory: .qa-private/browser/gia-su-ai
  authStatePath: .qa-private/auth/gia-su-ai.json
  resetConfigPath: .qa-private/reset/gia-su-ai.json
auth:
  authenticatedSelector: '[data-qa="authenticated-shell"]'
  accountIdentitySelector: '[data-qa="account-email"]'
  accountIdentitySource: textContent
  allowedHosts:
    - accounts.google.com
    - apis.google.com
    - ssl.gstatic.com
    - www.gstatic.com
    - www.googleapis.com
  bootstrapTimeoutMs: 600000
suites:
  publicWebScenarioIds:
    - gia-su-ai-public-smoke
  authenticatedWebScenarioIds:
    - gia-su-ai-authenticated-catalog
  journeyIds: []
