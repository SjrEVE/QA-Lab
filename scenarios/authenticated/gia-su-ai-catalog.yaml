version: 1
id: gia-su-ai-authenticated-catalog
name: Gia Su AI authenticated catalog journey
type: authenticated-catalog
target:
  path: /app
viewports:
  - mobile-common
  - laptop
selectors:
  authenticatedShell:
    primary: '[data-qa="authenticated-shell"]'
    fallback: 'main'
    name: Authenticated app shell
  accountIdentity:
    primary: '[data-qa="account-email"]'
    name: Verified test account identity
  grade:
    primary: '[data-qa="grade-option"]'
    name: Registry-backed grade option
  subject:
    primary: '[data-qa="subject-option"]'
    name: Registry-backed subject option
  chapter:
    primary: '[data-qa="chapter-option"]'
    name: Registry-backed chapter option
  lesson:
    primary: '[data-qa="lesson-option"][data-lesson-id][data-registry-status="approved"]'
    name: Approved runtime lesson
  classroomReady:
    primary: '[data-qa="lesson-ready"][data-lesson-id]'
    name: Classroom lesson readiness
  startLesson:
    primary: '[data-qa="start-lesson"]'
    fallback: 'main button[type="button"]'
    name: Start lesson CTA
lessonContract:
  lessonIdAttribute: data-lesson-id
  registryStatusAttribute: data-registry-status
  approvedRegistryValue: approved
limits:
  maxMinutes: 5
  selectorTimeoutMs: 10000
  maxIssues: 30
